<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Orgarnize suas tarefas diarias aqui para melhor organizacão diaria.">
    <!-- Css do BootStrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Css do Projeto -->
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <title>AnotaTarefas</title>
</head>
<body class="bg-light">
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="updateToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header bg-primary text-white">
        <strong class="me-auto">Atualização Disponível</strong>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body">
        Uma nova versão do AnotaTarefas está disponível!
        <button id="reloadApp" class="btn btn-sm btn-outline-primary mt-2 d-block">Atualizar agora</button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="index.html">AnotaTarefas</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h1 id="addTtitulo" class="card-title fs-4 mb-4">Adicionar Tarefa</h1>
            <form id="formTarefa">
              <div class="mb-3">
                <label for="nomeTarefa" class="form-label">Tarefa</label>
                <input type="text" class="form-control" id="nomeTarefa" placeholder="Digite o nome da tarefa" required>
              </div>
              <div class="mb-3">
                <label for="dataTarefa" class="form-label">Data</label>
                <input type="date" class="form-control" id="dataTarefa" required>
              </div>
              <div class="mb-3">
                <label for="prioridadeTarefa" class="form-label">Prioridade</label>
                <select class="form-select" id="prioridadeTarefa">
                  <option value="baixa">Baixa</option>
                  <option value="media">Média</option>
                  <option value="alta">Alta</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100">Adicionar Tarefa</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm h-100">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 id="listaTarefaTitle" class="card-title fs-5 mb-0">Minhas Tarefas</h2>
            </div>
            <ul id="listaTarefa" class="list-group list-group-flush flex-grow-1"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-primary text-white py-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 AnotaTarefas</p>
    </div>
  </footer>

  <!-- Js do Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <!-- Js do Projeto -->
  <script src="./js/index.js"></script>
</body>
</html>
